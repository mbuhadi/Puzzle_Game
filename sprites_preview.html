// ── Sprite builder ────────────────────────────────────────────────────────────
function makeSprite(rows, pal, px) {
  const W = rows[0].length, H = rows.length;
  const cv = document.createElement('canvas');
  cv.width = W * px; cv.height = H * px;
  const g = cv.getContext('2d');
  rows.forEach((row, r) => {
    for (let c = 0; c < row.length; c++) {
      const col = pal[row[c]];
      if (col) { g.fillStyle = col; g.fillRect(c*px, r*px, px, px); }
    }
  });
  return cv;
}

// ── Tile drawing (all paint into a 40×40 region at x,y) ──────────────────────
function tileSand(g, x, y) {
  g.fillStyle = '#dfc07a'; g.fillRect(x, y, 40, 40);
  g.strokeStyle = '#c8a050'; g.lineWidth = 1;
  g.beginPath();
  g.moveTo(x, y+20); g.lineTo(x+40, y+20);
  g.moveTo(x+20, y); g.lineTo(x+20, y+40);
  g.stroke();
  g.fillStyle = '#9a7030';
  [[2,2],[36,2],[2,36],[36,36]].forEach(([dx,dy]) => g.fillRect(x+dx, y+dy, 2, 2));
}
function tilePalace(g, x, y, v) {
  g.fillStyle = v ? '#f0e6c8' : '#e8d8a0'; g.fillRect(x, y, 40, 40);
  g.strokeStyle = '#c8a050'; g.lineWidth = 1.5;
  g.strokeRect(x+2, y+2, 36, 36);
  g.fillStyle = v ? '#c8a050' : '#1a9c8e';
  g.beginPath();
  g.moveTo(x+20, y+6); g.lineTo(x+34, y+20);
  g.lineTo(x+20, y+34); g.lineTo(x+6, y+20);
  g.closePath(); g.fill();
}
function tileDungeon(g, x, y) {
  g.fillStyle = '#1e1830'; g.fillRect(x, y, 40, 40);
  g.strokeStyle = '#100c1e'; g.lineWidth = 1;
  g.strokeRect(x+1, y+1, 38, 38);
  g.strokeStyle = '#3a2868'; g.lineWidth = 0.5;
  g.beginPath();
  g.moveTo(x+3, y+3); g.lineTo(x+37, y+3);
  g.moveTo(x+3, y+3); g.lineTo(x+3, y+37);
  g.stroke();
}
function wallDesert(g, x, y) {
  g.fillStyle = '#c8a050'; g.fillRect(x, y, 40, 40);
  g.strokeStyle = '#9a7030'; g.lineWidth = 1;
  for (let r = 0; r < 3; r++) {
    const oy = y + 4 + r * 12, off = (r % 2) * 20;
    for (let c = -1; c < 3; c++) g.strokeRect(x + off + c*20 + 1, oy + 1, 18, 10);
  }
}
function wallPalace(g, x, y) {
  g.fillStyle = '#0d5c55'; g.fillRect(x, y, 40, 40);
  g.fillStyle = '#f0c030';
  g.fillRect(x, y, 40, 3); g.fillRect(x, y+37, 40, 3);
  g.strokeStyle = '#b88a18'; g.lineWidth = 1;
  for (let i = 0; i <= 2; i++) {
    g.beginPath(); g.moveTo(x + i*20, y+3); g.lineTo(x + i*20, y+37); g.stroke();
  }
}
function wallDungeon(g, x, y) {
  g.fillStyle = '#2a2040'; g.fillRect(x, y, 40, 40);
  g.strokeStyle = '#5a5068'; g.lineWidth = 0.8;
  for (let r = 0; r < 3; r++) {
    const oy = y + r*13;
    g.beginPath(); g.moveTo(x, oy+10); g.lineTo(x+40, oy+10); g.stroke();
    const jx = x + (r%2 === 0 ? 20 : 10);
    g.beginPath(); g.moveTo(jx, oy); g.lineTo(jx, oy+10); g.stroke();
  }
  g.strokeStyle = '#3a2868'; g.lineWidth = 1;
  g.beginPath(); g.moveTo(x+8, y+5); g.lineTo(x+15, y+20); g.lineTo(x+10, y+35); g.stroke();
}

// ── Render to a single canvas ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const CW = 900, CH = 1060;
canvas.width = CW; canvas.height = CH;

// Fit canvas width to viewport
const vw = Math.min(window.innerWidth - 16, CW);
canvas.style.width  = vw + 'px';
canvas.style.height = Math.round(CH * vw / CW) + 'px';

const ctx = canvas.getContext('2d');
ctx.fillStyle = '#100c1e';
ctx.fillRect(0, 0, CW, CH);

// Divider line
function divider(y) {
  ctx.strokeStyle = '#1e1830';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(CW-24, y); ctx.stroke();
}

// Section heading
function heading(text, y) {
  ctx.font = 'bold 12px monospace';
  ctx.fillStyle = '#1a9c8e';
  ctx.textAlign = 'left';
  ctx.fillText(text, 24, y);
}

// Label centred below something
function lbl(text, cx, y) {
  ctx.font = '11px monospace';
  ctx.fillStyle = '#8878b8';
  ctx.textAlign = 'center';
  ctx.fillText(text, cx, y);
}

// Draw a sprite canvas scaled up onto ctx
function blit(spr, cx, cy, scale) {
  const dw = spr.width * scale, dh = spr.height * scale;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(spr, cx - dw/2, cy, dw, dh);
}

// Draw a 40×40 tile scaled up
function blitTile(fn, cx, cy, scale, ...args) {
  const T = 40;
  ctx.save();
  ctx.translate(cx - T*scale/2, cy);
  ctx.scale(scale, scale);
  fn(ctx, 0, 0, ...args);
  ctx.restore();
}

// ── Title ─────────────────────────────────────────────────────────────────────
ctx.font = 'bold 22px monospace';
ctx.fillStyle = '#f0c030';
ctx.textAlign = 'left';
ctx.fillText('SPRITES & COMPONENTS', 24, 42);
ctx.font = '12px monospace';
ctx.fillStyle = '#6b30a0';
ctx.fillText('SNES Aladdin × Undertale — top-down pixel art', 24, 62);

// ── CHARACTERS ────────────────────────────────────────────────────────────────
divider(76); heading('CHARACTERS', 96);

const CHAR_SCALE = 5;
const chars = [
  [SPR_PLAYER,   'Player'],
  [SPR_MERCHANT, 'Merchant'],
  [SPR_GUARD,    'Guard'],
  [SPR_GENIE,    'Genie'],
];
const CHAR_Y = 110;
chars.forEach(([spr, name], i) => {
  const cx = 112 + i * 226;
  blit(spr, cx, CHAR_Y, CHAR_SCALE);
  lbl(name, cx, CHAR_Y + spr.height * CHAR_SCALE + 14);
});

// ── PROPS ─────────────────────────────────────────────────────────────────────
divider(310); heading('PROPS', 330);

const PROP_SCALE = 5;
const PROP_Y = 345;
[[SPR_LAMP, 'Lamp', 150], [SPR_CHEST, 'Chest', 450], [SPR_DOOR, 'Door', 750]]
  .forEach(([spr, name, cx]) => {
    blit(spr, cx, PROP_Y, PROP_SCALE);
    lbl(name, cx, PROP_Y + spr.height * PROP_SCALE + 14);
  });

// ── FLOOR TILES ───────────────────────────────────────────────────────────────
divider(510); heading('FLOOR TILES', 530);

const TILE_SCALE = 3;
const FLOOR_Y = 545;
[
  [(g,x,y) => tileSand(g,x,y),     'Sand'],
  [(g,x,y) => tilePalace(g,x,y,0), 'Palace A'],
  [(g,x,y) => tilePalace(g,x,y,1), 'Palace B'],
  [(g,x,y) => tileDungeon(g,x,y),  'Dungeon'],
].forEach(([fn, name], i) => {
  const cx = 112 + i * 226;
  blitTile(fn, cx, FLOOR_Y, TILE_SCALE);
  lbl(name, cx, FLOOR_Y + 40 * TILE_SCALE + 14);
});

// ── WALL TILES ────────────────────────────────────────────────────────────────
divider(700); heading('WALL TILES', 720);

const WALL_Y = 735;
[
  [(g,x,y) => wallDesert(g,x,y),  'Desert wall'],
  [(g,x,y) => wallPalace(g,x,y),  'Palace wall'],
  [(g,x,y) => wallDungeon(g,x,y), 'Dungeon wall'],
].forEach(([fn, name], i) => {
  const cx = 150 + i * 300;
  blitTile(fn, cx, WALL_Y, TILE_SCALE);
  lbl(name, cx, WALL_Y + 40 * TILE_SCALE + 14);
});

// ── ROOM SAMPLES ──────────────────────────────────────────────────────────────
divider(880); heading('ROOM SAMPLES', 900);

const RW = 240, RH = 140, BORDER = 40;
const ROOM_Y = 916;

function drawRoom(wallFn, floorFn, rx, ry) {
  // tile walls edge-to-edge
  for (let y = 0; y < RH; y += 40)
    for (let x = 0; x < RW; x += 40)
      wallFn(ctx, rx + x, ry + y);
  // tile interior
  for (let y = 0; y < RH - BORDER*2; y += 40)
    for (let x = 0; x < RW - BORDER*2; x += 40)
      floorFn(ctx, rx + BORDER + x, ry + BORDER + y);
  // player centred
  const spr = SPR_PLAYER, sc = 3;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(spr,
    rx + RW/2 - spr.width*sc/2,
    ry + RH/2 - spr.height*sc/2 + 10,
    spr.width*sc, spr.height*sc);
}

const rooms = [
  [wallDesert,  tileSand,    'Desert Bazaar', '#f0c030'],
  [wallPalace,  tilePalace,  'Golden Palace', '#1a9c8e'],
  [wallDungeon, tileDungeon, 'Dungeon',       '#3a2868'],
];
rooms.forEach(([wFn, fFn, name, accent], i) => {
  const rx = 30 + i * 295;
  drawRoom(wFn, fFn, rx, ROOM_Y);
  // accent border
  ctx.strokeStyle = accent; ctx.lineWidth = 2;
  ctx.strokeRect(rx, ROOM_Y, RW, RH);
  lbl(name, rx + RW/2, ROOM_Y + RH + 16);
});
