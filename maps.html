<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map 1 — Puzzle Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #14120e;
    color: #e8dfc8;
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 48px;
    gap: 16px;
  }
  h1 { font-size: 26px; color: #c8a84b; letter-spacing: 3px; }

  .top-bar {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .meta { font-family: monospace; font-size: 12px; color: #6e695f; }
  .meta span { color: #a09070; }

  .bar-btn {
    background: none;
    border: 1px solid #3a3020;
    color: #c8a84b;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    padding: 5px 16px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .bar-btn:hover { background: #1e1c18; border-color: #c8a84b; }
  #btnSave { color: #7a9a6a; border-color: #2a3a1e; }
  #btnSave:hover { border-color: #7a9a6a; }
  #saveConfirm {
    font-family: monospace; font-size: 11px; color: #4a7c59;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }
  #saveConfirm.show { opacity: 1; }

  /* ── Layout ──────────────────────────────────────────────────────── */
  .layout-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .map-side {
    display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  #mapCanvas {
    display: block;
    image-rendering: pixelated;
    border: 2px solid #2e2a1e;
    border-radius: 4px;
    outline: none;
    max-width: 100%;
    touch-action: none;
  }
  #mapCanvas:focus { border-color: #c8a84b; }
  .hint { font-family: monospace; font-size: 11px; color: #3a3530; }


  /* ── Interactables panel ─────────────────────────────────────────── */
  .panel {
    width: 190px;
    flex-shrink: 0;
    background: #0e0d0a;
    border: 1px solid #2e2a1e;
    border-radius: 8px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 524px;
    overflow-y: auto;
  }
  .panel-title {
    font-family: monospace;
    font-size: 10px;
    color: #4a4540;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .puzzle-group { margin-bottom: 8px; }
  .puzzle-label {
    font-family: monospace;
    font-size: 9px;
    color: #2e2a1e;
    letter-spacing: 1px;
    margin-bottom: 2px;
    padding-left: 4px;
  }
  .pi-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 6px;
    border-radius: 4px;
    cursor: grab;
    user-select: none;
    border: 1px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }
  .pi-item:hover { background: #1a1814; border-color: #2e2a1e; }
  .pi-item.is-placed { opacity: 0.4; }
  .pi-handle { color: #2e2a24; font-size: 14px; line-height: 1; flex-shrink: 0; }
  .pi-id { font-family: monospace; font-size: 12px; color: #c8a84b; flex: 1; }
  .pi-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #4a7c59; flex-shrink: 0; visibility: hidden;
  }
  .pi-item.is-placed .pi-dot { visibility: visible; }
  .panel-foot {
    font-family: monospace; font-size: 9px; color: #2a2520;
    text-align: center; margin-top: 10px; letter-spacing: 0.5px;
  }

  /* ── Drag ghost ──────────────────────────────────────────────────── */
  #dragGhost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    display: none;
    background: #ff8c00;
    color: #000;
    font-family: monospace;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 9px;
    border-radius: 3px;
    transform: translate(-50%, -130%);
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* ── Examine overlay ─────────────────────────────────────────────── */
  #examineOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #examineOverlay.open { display: flex; }
  #examineBox {
    display: flex;
    flex-direction: column;
    width: 960px;
    height: 82vh;
    max-width: 96vw;
    background: #14120e;
    border: 2px solid #c8a84b;
    border-radius: 10px;
    overflow: hidden;
  }
  #examineFrame { flex: 1; border: none; width: 100%; min-height: 0; }
  #examineLeave {
    flex-shrink: 0;
    background: #0e0d0a;
    border: none;
    border-top: 1px solid #2e2a1e;
    color: #c8a84b;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 14px 0;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s, color 0.15s;
  }
  #examineLeave:hover { background: #1a1814; color: #e8c860; }

  /* ── Legend ──────────────────────────────────────────────────────── */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    justify-content: center;
    font-family: monospace; font-size: 11px; color: #4a4540;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }

  a { font-size: 12px; color: #4a4540; font-family: sans-serif; text-decoration: none; margin-top: 4px; }
  a:hover { color: #c8a84b; }
</style>
</head>
<body>

<h1>Map 1</h1>

<div class="top-bar">
  <div class="meta">
    Scale: <span>1 tile = 10 sq ft</span>
    &nbsp;|&nbsp; Speed: <span>8.5 tiles / sec</span>
    &nbsp;|&nbsp; Area: <span id="sqftLabel">…</span>
  </div>
  <button class="bar-btn" id="btnRandomize">Randomize</button>
  <button class="bar-btn" id="btnSave">Save Map</button>
  <span id="saveConfirm">saved ✓</span>
</div>

<div class="layout-row">

  <div class="map-side">
    <canvas id="mapCanvas" tabindex="0"></canvas>
    <div class="hint">WASD / Arrows &nbsp;·&nbsp; E to examine &nbsp;·&nbsp; joystick on touch</div>
  </div>

  <div class="panel">
    <div class="panel-title">INTERACTABLES</div>
    <div id="panelList"></div>
    <div class="panel-foot">drag onto map · drag off to remove</div>
  </div>

</div>

<div class="legend">
  <div class="legend-item"><div class="swatch" style="background:#1a1410;"></div>Exterior</div>
  <div class="legend-item"><div class="swatch" style="background:#c8a86a;"></div>Room Floor</div>
  <div class="legend-item"><div class="swatch" style="background:#d4ba88;"></div>Courtyard</div>
  <div class="legend-item"><div class="swatch" style="background:#3a7aaa;"></div>Pond</div>
  <div class="legend-item"><div class="swatch" style="background:#8a6a40;"></div>Wall</div>
  <div class="legend-item"><div class="swatch" style="background:#c8a84b;border-radius:50%;"></div>Player</div>
</div>

<a href="index.html">← Back to Home</a>

<div id="dragGhost"></div>

<div id="examineOverlay">
  <div id="examineBox">
    <iframe id="examineFrame"></iframe>
    <button id="examineLeave">Leave</button>
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const TILE_PX       = 32;
const SQFT_PER_TILE = 10;
const SPEED         = 8.5;
const HITBOX        = 0.28;
const VIEWPORT_W    = 800;
const VIEWPORT_H    = 520;
const GRID_W        = 72;
const GRID_H        = 60;

const T = { VOID:0, FLOOR:1, WALL:2, WATER:3, COURTYARD:4 };

// ── Riad house layout parameters (organic rooms, ~4k sq ft) ──────────────────
const COURT_X = 27, COURT_Y = 19;   // courtyard top-left anchor
const COURT_W = 13, COURT_H = 13;   // courtyard footprint
const POND_R  = 3;                  // diamond pond radius (tiles)

// ── All interactables ─────────────────────────────────────────────────────────
const ALL = [
  { id:'p1g1s', puzzle:1 }, { id:'p1p1s', puzzle:1 },
  { id:'p2g1s', puzzle:2 }, { id:'p2g2s', puzzle:2 },
  { id:'p3g1s', puzzle:3 }, { id:'p3g2s', puzzle:3 }, { id:'p3g3s', puzzle:3 },
  { id:'p4g1s', puzzle:4 },
  { id:'p5g1s', puzzle:5 },
  { id:'p6g1s', puzzle:6 }, { id:'p6p1s', puzzle:6 },
  { id:'p7g1s', puzzle:7 }, { id:'p7g2s', puzzle:7 }, { id:'p7p1s', puzzle:7 },
];

const PLACED = [];

// ── Objects (decor layer from the map editor) ─────────────────────────────────
const OBJECTS   = [];        // {col, row, type, solid}
const OBJ_SOLID = new Set(); // cell keys (row*GRID_W+col) that block movement

function rebuildObjSolid() {
  OBJ_SOLID.clear();
  for (const o of OBJECTS)
    if (o.solid) OBJ_SOLID.add(o.row * GRID_W + o.col);
}

// ── Seed / persistence ────────────────────────────────────────────────────────
const DEFAULT_SEED = 0x4b3c2a;
let currentSeed = parseInt(localStorage.getItem('map1seed')) || DEFAULT_SEED;

const PLACED_KEY = seed => 'map1placed_' + seed;

function savePlaced() {
  localStorage.setItem(PLACED_KEY(currentSeed), JSON.stringify(PLACED));
  const el = document.getElementById('saveConfirm');
  el.classList.add('show');
  clearTimeout(savePlaced._t);
  savePlaced._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function loadPlaced(seed) {
  PLACED.length = 0;
  try {
    const raw = localStorage.getItem(PLACED_KEY(seed));
    if (raw) JSON.parse(raw).forEach(p => PLACED.push(p));
  } catch(e) {}
}

// ── Map generation (Arabian riad with central courtyard) ──────────────────────
let mapGrid = null;

function fillRect(grid, x, y, w, h, type) {
  for (let ry = y; ry < y + h; ry++)
    for (let rx = x; rx < x + w; rx++)
      if (ry >= 0 && ry < GRID_H && rx >= 0 && rx < GRID_W)
        grid[ry][rx] = type;
}

function generateRiad(seed) {
  let s = seed | 0;
  const rng = (lo, hi) => {
    s = Math.imul(s, 1664525) + 1013904223 | 0;
    return lo + ((s >>> 0) % (hi - lo + 1));
  };

  const grid = Array.from({ length: GRID_H }, () => new Array(GRID_W).fill(T.VOID));

  // ── Courtyard ──────────────────────────────────────────────────────────────
  fillRect(grid, COURT_X, COURT_Y, COURT_W, COURT_H, T.COURTYARD);

  // ── Rooms: randomized count & placement around the courtyard ────────────────
  // Each side can host 0, 1, or 2 rooms — a shuffled slot list decides which
  // sides get used and how many rooms land there, so the room count varies
  // per seed and the footprint isn't forced into a rectangle.
  const slots = ['N','N','S','S','E','E','W','W'];
  for (let i = slots.length - 1; i > 0; i--) {
    const j = rng(0, i);
    [slots[i], slots[j]] = [slots[j], slots[i]];
  }
  const roomCount = 3 + rng(0, 4);   // 3..7 rooms
  const chosen = slots.slice(0, roomCount);
  const perSide = {};
  for (const side of chosen) perSide[side] = (perSide[side] || 0) + 1;

  const rooms = [];   // {side, x, y, w, h, segStart, segLen}

  function placeSide(side, count) {
    const span = (side === 'N' || side === 'S') ? COURT_W : COURT_H;
    const segs = [];
    if (count === 1) {
      const len = rng(Math.max(6, span - 3), span);
      segs.push({ start: rng(0, span - len), len });
    } else {
      const half = Math.floor(span / 2);
      const len1 = rng(Math.max(3, half - 2), half);
      const len2 = rng(Math.max(3, span - half - 3), span - half - 1);
      segs.push({ start: 0, len: len1 });
      segs.push({ start: span - len2, len: len2 });
    }
    for (const seg of segs) {
      const depth = rng(5, 8);
      let rx, ry, rw, rh;
      if (side === 'N') {
        rw = seg.len; rh = depth;
        rx = COURT_X + seg.start; ry = COURT_Y - 1 - depth;
      } else if (side === 'S') {
        rw = seg.len; rh = depth;
        rx = COURT_X + seg.start; ry = COURT_Y + COURT_H + 1;
      } else if (side === 'W') {
        rw = depth; rh = seg.len;
        rx = COURT_X - 1 - depth; ry = COURT_Y + seg.start;
      } else { // E
        rw = depth; rh = seg.len;
        rx = COURT_X + COURT_W + 1; ry = COURT_Y + seg.start;
      }
      fillRect(grid, rx, ry, rw, rh, T.FLOOR);
      rooms.push({ side, x: rx, y: ry, w: rw, h: rh, segStart: seg.start, segLen: seg.len });
    }
  }

  for (const side of Object.keys(perSide)) placeSide(side, perSide[side]);

  // ── Auto-wall: every void tile touching floor/courtyard becomes wall ────────
  // This also forms the separating wall between each room and the courtyard,
  // since rooms are placed with a 1-tile void gap against the courtyard edge.
  const floorCells = [];
  for (let y = 0; y < GRID_H; y++)
    for (let x = 0; x < GRID_W; x++)
      if (grid[y][x] === T.FLOOR || grid[y][x] === T.COURTYARD) floorCells.push([x, y]);
  for (const [x, y] of floorCells) {
    for (const [nx, ny] of [[x-1,y],[x+1,y],[x,y-1],[x,y+1]]) {
      if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) continue;
      if (grid[ny][nx] === T.VOID) grid[ny][nx] = T.WALL;
    }
  }

  // ── Diamond pond, centered in the courtyard ──────────────────────────────────
  const pcx = COURT_X + Math.floor(COURT_W / 2);
  const pcy = COURT_Y + Math.floor(COURT_H / 2);
  for (let dy = -POND_R; dy <= POND_R; dy++)
    for (let dx = -POND_R; dx <= POND_R; dx++)
      if (Math.abs(dx) + Math.abs(dy) <= POND_R)
        grid[pcy+dy][pcx+dx] = T.WATER;

  // ── Doorways: carve a 2-tile opening through each room's separating wall ────
  for (const r of rooms) {
    const jitter = r.segLen > 4 ? rng(-1, 1) : 0;
    const offset = Math.max(0, Math.min(r.segLen - 2, Math.floor((r.segLen - 2) / 2) + jitter));
    const doorAt = r.segStart + offset;
    if (r.side === 'N') {
      const gy = COURT_Y - 1;
      grid[gy][COURT_X + doorAt]     = T.FLOOR;
      grid[gy][COURT_X + doorAt + 1] = T.FLOOR;
    } else if (r.side === 'S') {
      const gy = COURT_Y + COURT_H;
      grid[gy][COURT_X + doorAt]     = T.FLOOR;
      grid[gy][COURT_X + doorAt + 1] = T.FLOOR;
    } else if (r.side === 'W') {
      const gx = COURT_X - 1;
      grid[COURT_Y + doorAt][gx]     = T.FLOOR;
      grid[COURT_Y + doorAt + 1][gx] = T.FLOOR;
    } else { // E
      const gx = COURT_X + COURT_W;
      grid[COURT_Y + doorAt][gx]     = T.FLOOR;
      grid[COURT_Y + doorAt + 1][gx] = T.FLOOR;
    }
  }

  // ── Floor count ──────────────────────────────────────────────────────────────
  let floorCount = 0;
  for (const row of grid)
    for (const t of row)
      if (t === T.FLOOR || t === T.COURTYARD) floorCount++;

  // ── Start position: center of the first generated room ───────────────────────
  const first = rooms[0];
  const start = first
    ? { x: first.x + first.w / 2, y: first.y + first.h / 2 }
    : { x: COURT_X + 1.5, y: COURT_Y + 1.5 };

  return { grid, floorCount, start };
}

// ── Collision ─────────────────────────────────────────────────────────────────
function walkable(col, row) {
  if (row < 0 || row >= GRID_H || col < 0 || col >= GRID_W) return false;
  if (OBJ_SOLID.has(row * GRID_W + col)) return false;
  const t = mapGrid[row][col];
  return t === T.FLOOR || t === T.COURTYARD;
}
function canMoveTo(x, y) {
  const h = HITBOX;
  return walkable(Math.floor(x-h), Math.floor(y-h))
      && walkable(Math.floor(x+h), Math.floor(y-h))
      && walkable(Math.floor(x-h), Math.floor(y+h))
      && walkable(Math.floor(x+h), Math.floor(y+h));
}

// ── Player ────────────────────────────────────────────────────────────────────
const player = { x: 0, y: 0 };
const keys   = {};

// ── Examine system ────────────────────────────────────────────────────────────
const examineOverlay = document.getElementById('examineOverlay');
const examineFrame   = document.getElementById('examineFrame');

const INTERACT_RADIUS = 1.2;  // tiles — proximity for thought bubble
let activeInteractable = null;
let exitDir = { x: 0, y: -1 };
let nearbyInteractable = null; // updated each frame; drives thought bubble
let bubbleBounds = null;       // world-pixel rect of thought bubble for tap hit-test

function openExamine(p) {
  for (const k in keys) keys[k] = false;
  activeInteractable = p;
  const ix = p.col + 0.5, iy = p.row + 0.5;
  const dx = player.x - ix, dy = player.y - iy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  exitDir = dist > 0.05 ? { x: dx/dist, y: dy/dist } : { x: 0, y: -1 };
  const baseId = p.id.replace(/s$/, '');
  examineFrame.src = 'puzzles_curated.html?chunk=' + baseId;
  examineOverlay.classList.add('open');
}

function closeExamine() {
  examineOverlay.classList.remove('open');
  examineFrame.src = '';
  if (activeInteractable) {
    const ix = activeInteractable.col + 0.5, iy = activeInteractable.row + 0.5;
    const tx = ix + exitDir.x * 2.5, ty = iy + exitDir.y * 2.5;
    if (canMoveTo(tx, ty)) { player.x = tx; player.y = ty; }
    activeInteractable = null;
  }
  canvas.focus();
}

document.getElementById('examineLeave').addEventListener('click', closeExamine);

// ── Nearby interactable detection ─────────────────────────────────────────────
function getNearbyInteractable() {
  for (const p of PLACED) {
    const dx = player.x - (p.col + 0.5), dy = player.y - (p.row + 0.5);
    if (Math.sqrt(dx*dx + dy*dy) < INTERACT_RADIUS) return p;
  }
  return null;
}

function updateNearby() {
  if (examineOverlay.classList.contains('open')) { nearbyInteractable = null; return; }
  nearbyInteractable = getNearbyInteractable();
  if (!nearbyInteractable) bubbleBounds = null;
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(dt) {
  if (drag.active) return;
  let dx = JOY.dx, dy = JOY.dy;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  // Clamp combined input to unit length
  const mag = Math.sqrt(dx*dx + dy*dy);
  if (mag > 1) { dx /= mag; dy /= mag; }
  const steps = Math.max(1, Math.ceil(SPEED * dt / 0.35));
  const sdx = dx * SPEED * dt / steps;
  const sdy = dy * SPEED * dt / steps;
  for (let i = 0; i < steps; i++) {
    if (canMoveTo(player.x + sdx, player.y)) player.x += sdx;
    if (canMoveTo(player.x, player.y + sdy)) player.y += sdy;
  }
  updateNearby();
}

// ── Camera ────────────────────────────────────────────────────────────────────
function getCamera() {
  return {
    x: Math.round(Math.max(0, Math.min(GRID_W * TILE_PX - VIEWPORT_W, player.x * TILE_PX - VIEWPORT_W / 2))),
    y: Math.round(Math.max(0, Math.min(GRID_H * TILE_PX - VIEWPORT_H, player.y * TILE_PX - VIEWPORT_H / 2))),
  };
}
function screenToTile(relX, relY) {
  const cam = getCamera();
  return { col: Math.floor((relX + cam.x) / TILE_PX), row: Math.floor((relY + cam.y) / TILE_PX) };
}

// ── Drawing ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');

function drawTile(t, px, py) {
  const S = TILE_PX;
  switch (t) {
    case T.VOID:
      ctx.fillStyle = '#1a1410'; ctx.fillRect(px, py, S, S);
      break;

    case T.FLOOR:
      ctx.fillStyle = '#c8a86a'; ctx.fillRect(px, py, S, S);
      break;

    case T.COURTYARD:
      ctx.fillStyle = '#d4ba88'; ctx.fillRect(px, py, S, S);
      break;

    case T.WALL: {
      // Adobe mud-brick
      ctx.fillStyle = '#8a6a40'; ctx.fillRect(px, py, S, S);
      // Top highlight (lighter brick course)
      ctx.fillStyle = '#a07a4a'; ctx.fillRect(px, py, S, 6);
      // Bottom shadow
      ctx.fillStyle = '#5a4020'; ctx.fillRect(px, py+S-4, S, 4);
      // Brick pattern
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(px, py+9, S, 1);
      ctx.fillRect(px, py+18, S, 1);
      ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
      ctx.strokeRect(px+.5, py+.5, S-1, S-1);
      break;
    }

    case T.WATER: {
      // Pond water with subtle shimmer
      const wt = performance.now() / 1000;
      ctx.fillStyle = '#2a6898'; ctx.fillRect(px, py, S, S);
      const shimmer = 0.12 + 0.08 * Math.sin(px * 0.25 + wt * 1.8) * Math.cos(py * 0.25 + wt * 1.3);
      ctx.fillStyle = `rgba(80,160,220,${shimmer.toFixed(3)})`;
      ctx.fillRect(px+2, py+2, S-4, S-4);
      // Tiny specular glint
      ctx.fillStyle = 'rgba(200,240,255,0.25)';
      ctx.fillRect(px+6, py+5, 4, 2);
      break;
    }
  }
}

function drawObject(o, px, py) {
  const S = TILE_PX;
  switch (o.type) {
    case 'palm': {
      // Trunk with shadow edge
      ctx.fillStyle = '#7a5a30'; ctx.fillRect(px + S/2 - 2, py + S/2 - 2, 4, S/2 - 2);
      ctx.fillStyle = '#5a4020'; ctx.fillRect(px + S/2,     py + S/2 - 2, 2, S/2 - 2);
      // Fronds — layered ellipses
      ctx.fillStyle = '#2e7a3e';
      ctx.beginPath(); ctx.ellipse(px + S/2, py + S/3, 12, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3a9a50';
      ctx.beginPath(); ctx.ellipse(px + S/2, py + S/3 - 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#54b868';
      ctx.fillRect(px + S/2 - 5, py + S/3 - 5, 4, 2);
      break;
    }
    case 'bush': {
      ctx.fillStyle = '#3a6a28';
      ctx.beginPath(); ctx.arc(px + S/2, py + S/2 + 3, 11, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#5a8a3a';
      ctx.beginPath(); ctx.arc(px + S/2 - 4, py + S/2, 7, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px + S/2 + 5, py + S/2 + 1, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#78a858';
      ctx.fillRect(px + S/2 - 6, py + S/2 - 4, 3, 2);
      break;
    }
    case 'rock': {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(px + S/2 + 1, py + S/2 + 8, 11, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#6e6a60';
      ctx.beginPath(); ctx.ellipse(px + S/2, py + S/2 + 2, 11, 9, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8a8478';
      ctx.beginPath(); ctx.ellipse(px + S/2 - 2, py + S/2, 8, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#a8a296';
      ctx.fillRect(px + S/2 - 6, py + S/2 - 4, 4, 2);
      break;
    }
    case 'pot': {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(px + S/2 + 1, py + S - 5, 9, 3, 0, 0, Math.PI*2); ctx.fill();
      // Body
      ctx.fillStyle = '#b06a30';
      ctx.beginPath();
      ctx.moveTo(px + 10, py + 10);
      ctx.quadraticCurveTo(px + 4, py + S/2 + 2, px + 11, py + S - 5);
      ctx.lineTo(px + S - 11, py + S - 5);
      ctx.quadraticCurveTo(px + S - 4, py + S/2 + 2, px + S - 10, py + 10);
      ctx.closePath(); ctx.fill();
      // Rim + highlight
      ctx.fillStyle = '#8a4c20'; ctx.fillRect(px + 9, py + 8, S - 18, 4);
      ctx.fillStyle = '#d08a48'; ctx.fillRect(px + 11, py + 14, 3, 8);
      break;
    }
    case 'crate': {
      ctx.fillStyle = '#9a7a40'; ctx.fillRect(px + 4, py + 4, S - 8, S - 8);
      ctx.fillStyle = '#7a5c28'; ctx.fillRect(px + 4, py + S - 10, S - 8, 6);
      ctx.strokeStyle = '#5a4018'; ctx.lineWidth = 2;
      ctx.strokeRect(px + 5, py + 5, S - 10, S - 10);
      ctx.beginPath();
      ctx.moveTo(px + 6, py + 6); ctx.lineTo(px + S - 6, py + S - 6);
      ctx.moveTo(px + S - 6, py + 6); ctx.lineTo(px + 6, py + S - 6);
      ctx.stroke();
      break;
    }
    case 'rug': {
      ctx.fillStyle = '#a03848'; ctx.fillRect(px + 3, py + 5, S - 6, S - 10);
      ctx.strokeStyle = '#e8c860'; ctx.lineWidth = 1.5;
      ctx.strokeRect(px + 5.5, py + 7.5, S - 11, S - 15);
      // Centre diamond
      ctx.fillStyle = '#e8c860';
      ctx.beginPath();
      ctx.moveTo(px + S/2, py + S/2 - 5);
      ctx.lineTo(px + S/2 + 5, py + S/2);
      ctx.lineTo(px + S/2, py + S/2 + 5);
      ctx.lineTo(px + S/2 - 5, py + S/2);
      ctx.closePath(); ctx.fill();
      break;
    }
    default: {
      ctx.fillStyle = '#8a8478';
      ctx.beginPath(); ctx.arc(px + S/2, py + S/2, 9, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawPlacedItem(px, py, id, dimmed) {
  const S = TILE_PX;
  ctx.globalAlpha = dimmed ? 0.3 : 1;

  // Pulsing green glow
  const pulse = 0.55 + 0.25 * Math.sin(performance.now() / 400);
  ctx.shadowColor  = '#44ff88';
  ctx.shadowBlur   = 12 * pulse;
  ctx.fillStyle = `rgba(40,180,90,${(0.18 * pulse).toFixed(3)})`;
  ctx.fillRect(px+1, py+1, S-2, S-2);
  ctx.strokeStyle = `rgba(80,220,120,${pulse.toFixed(3)})`;
  ctx.lineWidth = 1.8;
  ctx.strokeRect(px+1.5, py+1.5, S-3, S-3);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#88ffb8';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(id, px+S/2, py+S/2);
  ctx.globalAlpha = 1;
}

function drawPlayer(px, py) {
  const S = TILE_PX, cx = px+S/2, cy = py+S/2;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(cx+1, cy+4, 7, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c8a84b';
  ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e8c860';
  ctx.beginPath(); ctx.arc(cx-2.5, cy-2.5, 4, 0, Math.PI*2); ctx.fill();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);  ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);  ctx.arcTo(x,   y+h, x,   y+h-r, r);
  ctx.lineTo(x, y+r);    ctx.arcTo(x,   y,   x+r, y,     r);
  ctx.closePath();
}

// Draws speech bubble in world-pixel space (inside ctx.translate block).
// Updates bubbleBounds for tap hit-testing.
function drawThoughtBubble() {
  if (!nearbyInteractable) { bubbleBounds = null; return; }
  const S = TILE_PX;
  const pcx = (player.x - 0.5) * S + S/2;   // player center x (world px)
  const pcy = (player.y - 0.5) * S;           // player top y (world px)

  const BW = 48, BH = 30, R = 7;
  const bx = pcx - BW/2, by = pcy - BH - 24;
  bubbleBounds = { wx: bx, wy: by, ww: BW, wh: BH };

  // Tail dots
  ctx.fillStyle = '#fffde0';
  [[pcx-2, pcy-6, 5], [pcx+1, pcy-13, 4], [pcx-1, pcy-19, 3]].forEach(([x,y,r]) => {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  });
  // Bubble fill
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#fffde0';
  roundRect(bx, by, BW, BH, R); ctx.fill();
  ctx.restore();
  // Bubble border
  ctx.strokeStyle = '#c8a84b'; ctx.lineWidth = 1.5;
  roundRect(bx, by, BW, BH, R); ctx.stroke();
  // "[E]" label
  ctx.fillStyle = '#7a5a10';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('[E]', bx + BW/2, by + BH/2);
}

// ── Virtual joystick ──────────────────────────────────────────────────────────
const JOY = {
  cx: 0, cy: 0,
  baseR: 50, thumbR: 22,
  active: false, touchId: null,
  tx: 0, ty: 0,
  dx: 0, dy: 0,
};

function joyReset() {
  JOY.active = false; JOY.touchId = null;
  JOY.tx = JOY.cx; JOY.ty = JOY.cy;
  JOY.dx = 0; JOY.dy = 0;
}
function joyMove(cx, cy) {
  const dx = cx - JOY.cx, dy = cy - JOY.cy;
  const dist = Math.hypot(dx, dy);
  const clamped = Math.min(dist, JOY.baseR);
  JOY.tx = JOY.cx + (dist > 0 ? (dx/dist)*clamped : 0);
  JOY.ty = JOY.cy + (dist > 0 ? (dy/dist)*clamped : 0);
  JOY.dx = dist > 5 ? dx/dist : 0;
  JOY.dy = dist > 5 ? dy/dist : 0;
}

function drawJoystick() {
  if (!JOY.active) return;
  const j = JOY;
  ctx.save();
  // Base ring
  ctx.globalAlpha = 0.22;
  ctx.strokeStyle = '#c8a84b'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(j.cx, j.cy, j.baseR, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#3a2a10';
  ctx.beginPath(); ctx.arc(j.cx, j.cy, j.baseR, 0, Math.PI*2); ctx.fill();
  // Thumb
  ctx.globalAlpha = j.active ? 0.85 : 0.45;
  ctx.fillStyle = '#c8a84b';
  ctx.beginPath(); ctx.arc(j.tx, j.ty, j.thumbR, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Drag and drop ─────────────────────────────────────────────────────────────
const ghost = document.getElementById('dragGhost');
let hoverTile = null;
const drag = { active: false, id: null, fromMap: false };

function startDrag(id, fromMap, clientX, clientY) {
  drag.active = true; drag.id = id; drag.fromMap = fromMap;
  ghost.textContent = id;
  ghost.style.display = 'block';
  ghost.style.left = clientX + 'px';
  ghost.style.top  = clientY + 'px';
  document.body.style.cursor = 'grabbing';
}
function endDrag() {
  drag.active = false; drag.id = null; drag.fromMap = false;
  ghost.style.display = 'none';
  hoverTile = null;
  document.body.style.cursor = '';
}

function onItemDown(e, id) {
  e.preventDefault();
  startDrag(id, false, e.clientX, e.clientY);
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const { col, row } = screenToTile(e.clientX - rect.left, e.clientY - rect.top);
  const hit = PLACED.findIndex(p => p.col === col && p.row === row);
  if (hit !== -1) { startDrag(PLACED[hit].id, true, e.clientX, e.clientY); e.preventDefault(); return; }
  canvas.focus();
});

document.addEventListener('mousemove', e => {
  if (!drag.active) return;
  ghost.style.left = e.clientX + 'px';
  ghost.style.top  = e.clientY + 'px';
  const rect = canvas.getBoundingClientRect();
  const over = e.clientX >= rect.left && e.clientX <= rect.right &&
               e.clientY >= rect.top  && e.clientY <= rect.bottom;
  hoverTile = over ? screenToTile(e.clientX - rect.left, e.clientY - rect.top) : null;
});

document.addEventListener('mouseup', e => {
  if (!drag.active) return;
  const rect = canvas.getBoundingClientRect();
  const overCanvas = e.clientX >= rect.left && e.clientX <= rect.right &&
                     e.clientY >= rect.top  && e.clientY <= rect.bottom;
  if (overCanvas) {
    const { col, row } = screenToTile(e.clientX - rect.left, e.clientY - rect.top);
    const t = row >= 0 && row < GRID_H && col >= 0 && col < GRID_W ? mapGrid[row][col] : T.VOID;
    const isPlaceable = t === T.FLOOR || t === T.COURTYARD || t === T.WALL;
    const occupied    = PLACED.some(p => p.col === col && p.row === row && p.id !== drag.id);
    if (isPlaceable && !occupied) {
      const ex = PLACED.findIndex(p => p.id === drag.id);
      if (ex !== -1) PLACED.splice(ex, 1);
      PLACED.push({ id: drag.id, col, row });
      canvas.focus();
    }
  } else {
    const ex = PLACED.findIndex(p => p.id === drag.id);
    if (drag.fromMap && ex !== -1) PLACED.splice(ex, 1);
  }
  updatePanel();
  endDrag();
});

// ── Panel rendering ───────────────────────────────────────────────────────────
function updatePanel() {
  const list = document.getElementById('panelList');
  list.innerHTML = '';
  const groups = {};
  for (const item of ALL) (groups[item.puzzle] ??= []).push(item.id);
  for (const [puzzle, ids] of Object.entries(groups)) {
    const grp = document.createElement('div');
    grp.className = 'puzzle-group';
    const lbl = document.createElement('div');
    lbl.className = 'puzzle-label';
    lbl.textContent = `PUZZLE ${puzzle}`;
    grp.appendChild(lbl);
    for (const id of ids) {
      const isPlaced = PLACED.some(p => p.id === id);
      const el = document.createElement('div');
      el.className = 'pi-item' + (isPlaced ? ' is-placed' : '');
      el.innerHTML = `<span class="pi-handle">⠿</span><span class="pi-id">${id}</span><span class="pi-dot"></span>`;
      el.addEventListener('mousedown', e => onItemDown(e, id));
      grp.appendChild(el);
    }
    list.appendChild(grp);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const cam = getCamera();
  ctx.clearRect(0, 0, VIEWPORT_W, VIEWPORT_H);
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  const c0 = Math.max(0, Math.floor(cam.x / TILE_PX));
  const r0 = Math.max(0, Math.floor(cam.y / TILE_PX));
  const c1 = Math.min(GRID_W, c0 + Math.ceil(VIEWPORT_W / TILE_PX) + 2);
  const r1 = Math.min(GRID_H, r0 + Math.ceil(VIEWPORT_H / TILE_PX) + 2);

  for (let r = r0; r < r1; r++)
    for (let c = c0; c < c1; c++)
      drawTile(mapGrid[r][c], c*TILE_PX, r*TILE_PX);

  // Objects layer (above tiles, below interactables and player)
  for (const o of OBJECTS)
    drawObject(o, o.col*TILE_PX, o.row*TILE_PX);

  // Hover highlight during drag (green = valid, red = invalid)
  if (drag.active && hoverTile) {
    const { col, row } = hoverTile;
    const inBounds = row >= 0 && row < GRID_H && col >= 0 && col < GRID_W;
    const t = inBounds ? mapGrid[row][col] : T.VOID;
    const isPlaceable = t === T.FLOOR || t === T.COURTYARD || t === T.WALL;
    const occupied = isPlaceable && PLACED.some(p => p.col === col && p.row === row && p.id !== drag.id);
    ctx.fillStyle = (isPlaceable && !occupied) ? 'rgba(74,124,89,0.45)' : 'rgba(180,60,60,0.45)';
    ctx.fillRect(col*TILE_PX, row*TILE_PX, TILE_PX, TILE_PX);
  }

  for (const p of PLACED)
    drawPlacedItem(p.col*TILE_PX, p.row*TILE_PX, p.id, drag.active && drag.id === p.id);

  drawPlayer((player.x - 0.5)*TILE_PX, (player.y - 0.5)*TILE_PX);
  drawThoughtBubble();   // world space — drawn above player, inside translate
  ctx.restore();

  drawJoystick();        // screen space — fixed overlay on canvas
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTs = null;
function loop(ts) {
  const dt = lastTs !== null ? Math.min((ts - lastTs) / 1000, 0.1) : 0;
  lastTs = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('keydown', e => {
  keys[e.key] = true;
  e.preventDefault();
  if ((e.key === 'e' || e.key === 'E') && !examineOverlay.classList.contains('open')) {
    if (nearbyInteractable) openExamine(nearbyInteractable);
  }
  if (e.key === 'Escape') closeExamine();
});
canvas.addEventListener('keyup',  e => { keys[e.key] = false; });
canvas.addEventListener('blur',   ()  => { for (const k in keys) keys[k] = false; });
window.addEventListener('blur',   ()  => { for (const k in keys) keys[k] = false; });

// ── Touch input (joystick + thought-bubble tap) ───────────────────────────────
function canvasTouch(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    cx: (touch.clientX - rect.left) * (VIEWPORT_W / rect.width),
    cy: (touch.clientY - rect.top)  * (VIEWPORT_H / rect.height),
  };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const { cx, cy } = canvasTouch(t);
    // Thought bubble tap — check first so a tap on the bubble doesn't also spawn the joystick
    if (!examineOverlay.classList.contains('open') && bubbleBounds && nearbyInteractable) {
      const cam = getCamera();
      const wx = cx + cam.x, wy = cy + cam.y;
      if (wx >= bubbleBounds.wx && wx <= bubbleBounds.wx + bubbleBounds.ww &&
          wy >= bubbleBounds.wy && wy <= bubbleBounds.wy + bubbleBounds.wh) {
        openExamine(nearbyInteractable);
        continue;
      }
    }
    // Joystick — spawn at touch point
    if (!JOY.active && !examineOverlay.classList.contains('open')) {
      JOY.cx = cx; JOY.cy = cy;
      JOY.tx = cx; JOY.ty = cy;
      JOY.active = true; JOY.touchId = t.identifier;
      continue;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === JOY.touchId) {
      const { cx, cy } = canvasTouch(t);
      joyMove(cx, cy);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches)
    if (t.identifier === JOY.touchId) joyReset();
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches)
    if (t.identifier === JOY.touchId) joyReset();
});

// ── Init ──────────────────────────────────────────────────────────────────────
canvas.width  = VIEWPORT_W;
canvas.height = VIEWPORT_H;

function applyMap(result, seed) {
  mapGrid  = result.grid;
  player.x = result.start.x;
  player.y = result.start.y;
  document.getElementById('sqftLabel').textContent =
    `~${(result.floorCount * SQFT_PER_TILE).toLocaleString()} sq ft`;
  loadPlaced(seed);
}

// Check for custom map from the editor
const _urlParams = new URLSearchParams(location.search);
if (_urlParams.get('custom') === '1') {
  const _raw = localStorage.getItem('editorMap');
  let _loaded = false;
  if (_raw) {
    try {
      const _data = JSON.parse(_raw);
      if (_data.grid && _data.grid.length === GRID_H && _data.grid[0].length === GRID_W) {
        const _sp = _data.spawn || { col: 5, row: 5 };
        const _floorCount = _data.grid.flat().filter(t => t === T.FLOOR || t === T.COURTYARD).length;
        applyMap({
          grid: _data.grid.map(row => row.map(Number)),
          start: { x: _sp.col + 0.5, y: _sp.row + 0.5 },
          floorCount: _floorCount,
        }, 'custom');
        // Objects from the editor (solid ones block movement)
        OBJECTS.length = 0;
        if (Array.isArray(_data.objects)) {
          for (const o of _data.objects) {
            const col = +o.col, row = +o.row;
            if (col >= 0 && col < GRID_W && row >= 0 && row < GRID_H)
              OBJECTS.push({ col, row, type: String(o.type), solid: !!o.solid });
          }
        }
        rebuildObjSolid();
        // Interactables placed in the editor override any saved placement —
        // the editor is the source of truth for its own map
        if (Array.isArray(_data.interactables) && _data.interactables.length) {
          PLACED.length = 0;
          for (const p of _data.interactables) {
            const col = +p.col, row = +p.row;
            if (ALL.some(x => x.id === p.id) && col >= 0 && col < GRID_W && row >= 0 && row < GRID_H)
              PLACED.push({ id: p.id, col, row });
          }
        }
        // Hide randomize in custom mode and add an editor link
        document.getElementById('btnRandomize').style.display = 'none';
        const _back = document.createElement('a');
        _back.href = 'map-editor.html';
        _back.textContent = '← Back to Editor';
        _back.style.cssText = 'font-size:11px;color:#7a6030;font-family:monospace;text-decoration:none;';
        _back.onmouseover  = () => _back.style.color = '#c8a84b';
        _back.onmouseout   = () => _back.style.color = '#7a6030';
        document.querySelector('.top-bar').appendChild(_back);
        _loaded = true;
      }
    } catch (_e) { /* fall through to normal */ }
  }
  if (!_loaded) applyMap(generateRiad(currentSeed), currentSeed);
} else {
  applyMap(generateRiad(currentSeed), currentSeed);
}
updatePanel();
canvas.focus();
requestAnimationFrame(loop);

document.getElementById('btnRandomize').addEventListener('click', () => {
  currentSeed = Date.now() | 0;
  localStorage.setItem('map1seed', currentSeed);
  applyMap(generateRiad(currentSeed), currentSeed);
  updatePanel();
  canvas.focus();
});

document.getElementById('btnSave').addEventListener('click', () => {
  savePlaced();
  canvas.focus();
});
</script>
</body>
