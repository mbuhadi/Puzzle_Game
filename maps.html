<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map 1 — Puzzle Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #14120e;
    color: #e8dfc8;
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 48px;
    gap: 14px;
  }
  h1 { font-size: 26px; color: #c8a84b; letter-spacing: 3px; }
  .meta { font-family: monospace; font-size: 12px; color: #6e695f; }
  .meta span { color: #a09070; }

  #mapCanvas {
    display: block;
    image-rendering: pixelated;
    border: 2px solid #2e2a1e;
    border-radius: 4px;
    outline: none;
  }
  #mapCanvas:focus { border-color: #c8a84b; }

  .hint { font-family: monospace; font-size: 11px; color: #3a3530; }

  .legend {
    display: flex; gap: 18px; flex-wrap: wrap;
    justify-content: center;
    font-family: monospace; font-size: 11px; color: #4a4540;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }

  a { font-size: 12px; color: #4a4540; font-family: sans-serif; text-decoration: none; margin-top: 4px; }
  a:hover { color: #c8a84b; }
</style>
</head>
<body>

<h1>Map 1</h1>
<div class="meta">
  Scale: <span>1 tile = 10 sq ft</span>
  &nbsp;|&nbsp; Speed: <span>10 tiles / sec</span>
  &nbsp;|&nbsp; Area: <span id="sqftLabel">generating…</span>
</div>

<canvas id="mapCanvas" tabindex="0"></canvas>
<div class="hint">WASD / Arrow Keys &nbsp;·&nbsp; click canvas to focus</div>

<div class="legend">
  <div class="legend-item"><div class="swatch" style="background:#1a1814;"></div>Exterior</div>
  <div class="legend-item"><div class="swatch" style="background:#c8b98a;"></div>Floor</div>
  <div class="legend-item"><div class="swatch" style="background:#4a4235;"></div>Wall</div>
  <div class="legend-item"><div class="swatch" style="background:#4a7c59;"></div>Object</div>
  <div class="legend-item"><div class="swatch" style="background:#c8a84b;border-radius:50%;"></div>Player</div>
  <div class="legend-item"><div class="swatch" style="background:rgba(200,168,75,0.3);border-color:#c8a84b;"></div>Interactable</div>
</div>

<a href="index.html">← Back to Home</a>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const TILE_PX       = 32;
const SQFT_PER_TILE = 10;
const SPEED         = 10;    // tiles per second
const HITBOX        = 0.28;  // collision half-size in tiles
const VIEWPORT_W    = 800;
const VIEWPORT_H    = 520;
const GRID_W        = 68;
const GRID_H        = 58;

const T = { VOID:0, FLOOR:1, WALL:2, OBJ:3 };

// ── Interactables (future drag-and-drop) ──────────────────────────────────────
// { id: 'p1g1s', col: Number, row: Number }
const INTERACTABLES = [];

// ── House blueprint ───────────────────────────────────────────────────────────
// Interior rect placed roughly centred in the grid
const HX = 11, HY = 15;  // top-left of interior floor
const HW = 46, HH = 26;  // interior width × height (floor tiles)

// BSP controls
const MIN_ROOM_W = 7, MIN_ROOM_H = 6, MAX_BSP_DEPTH = 4;

// ── Map generation (BSP house layout) ────────────────────────────────────────
let mapGrid = null;

function generateHouse() {
  let seed = Date.now() | 0;
  const rng = (lo, hi) => {
    seed = Math.imul(seed, 1664525) + 1013904223 | 0;
    return lo + ((seed >>> 0) % (hi - lo + 1));
  };

  const grid = Array.from({ length: GRID_H }, () => new Array(GRID_W).fill(T.VOID));
  const rooms = [];

  // Recursively subdivide the house interior into rooms.
  // Each split places a 1-tile interior wall with a 2-tile opening.
  function bsp(x, y, w, h, depth) {
    const canV = w >= MIN_ROOM_W * 2 + 1;  // can split left/right
    const canH = h >= MIN_ROOM_H * 2 + 1;  // can split top/bottom

    if (depth >= MAX_BSP_DEPTH || (!canV && !canH)) {
      // Leaf: fill entire sub-rect with floor
      for (let ry = y; ry < y + h; ry++)
        for (let rx = x; rx < x + w; rx++)
          grid[ry][rx] = T.FLOOR;
      rooms.push({ x, y, w, h, cx: x + (w >> 1), cy: y + (h >> 1) });
      return;
    }

    // Prefer splitting the longer axis; randomise when both are possible
    let vert;
    if (canV && !canH) vert = true;
    else if (!canV && canH) vert = false;
    else vert = rng(0, 1) === 0;

    if (vert) {
      // Vertical dividing wall — splits room into left and right
      const sx = x + MIN_ROOM_W + rng(0, Math.max(0, w - MIN_ROOM_W * 2 - 1));
      bsp(x, y, sx - x, h, depth + 1);
      bsp(sx + 1, y, x + w - sx - 1, h, depth + 1);
      // Draw wall then cut a 2-tile-tall opening at a random row
      for (let ry = y; ry < y + h; ry++) grid[ry][sx] = T.WALL;
      const oy = y + 1 + rng(0, Math.max(0, h - 4));
      grid[oy][sx] = T.FLOOR;
      if (oy + 1 <= y + h - 2) grid[oy + 1][sx] = T.FLOOR;
    } else {
      // Horizontal dividing wall — splits room into top and bottom
      const sy = y + MIN_ROOM_H + rng(0, Math.max(0, h - MIN_ROOM_H * 2 - 1));
      bsp(x, y, w, sy - y, depth + 1);
      bsp(x, sy + 1, w, y + h - sy - 1, depth + 1);
      // Draw wall then cut a 2-tile-wide opening at a random column
      for (let rx = x; rx < x + w; rx++) grid[sy][rx] = T.WALL;
      const ox = x + 1 + rng(0, Math.max(0, w - 4));
      grid[sy][ox] = T.FLOOR;
      if (ox + 1 <= x + w - 2) grid[sy][ox + 1] = T.FLOOR;
    }
  }

  bsp(HX, HY, HW, HH, 0);

  // Exterior perimeter wall enclosing the house
  for (let rx = HX - 1; rx <= HX + HW; rx++) {
    grid[HY - 1][rx] = T.WALL;
    grid[HY + HH][rx] = T.WALL;
  }
  for (let ry = HY - 1; ry <= HY + HH; ry++) {
    grid[ry][HX - 1] = T.WALL;
    grid[ry][HX + HW] = T.WALL;
  }

  // Count actual floor tiles
  let floorCount = 0;
  for (const row of grid)
    for (const t of row)
      if (t === T.FLOOR) floorCount++;

  const s = rooms[0] || { cx: HX + (HW >> 1), cy: HY + (HH >> 1) };
  return { grid, floorCount, start: { x: s.cx + 0.5, y: s.cy + 0.5 } };
}

// ── Collision ─────────────────────────────────────────────────────────────────
function walkable(col, row) {
  if (row < 0 || row >= GRID_H || col < 0 || col >= GRID_W) return false;
  const t = mapGrid[row][col];
  return t === T.FLOOR || t === T.OBJ;
}
function canMoveTo(x, y) {
  const h = HITBOX;
  return walkable(Math.floor(x-h), Math.floor(y-h))
      && walkable(Math.floor(x+h), Math.floor(y-h))
      && walkable(Math.floor(x-h), Math.floor(y+h))
      && walkable(Math.floor(x+h), Math.floor(y+h));
}

// ── Player ────────────────────────────────────────────────────────────────────
const player = { x: 0, y: 0 };
const keys   = {};

function update(dt) {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  if (dx && dy) { dx *= 0.7071; dy *= 0.7071; }

  // Sub-step collision to prevent tunnelling at high speed
  const steps = Math.max(1, Math.ceil(SPEED * dt / 0.35));
  const sdx = dx * SPEED * dt / steps;
  const sdy = dy * SPEED * dt / steps;
  for (let i = 0; i < steps; i++) {
    if (canMoveTo(player.x + sdx, player.y)) player.x += sdx;
    if (canMoveTo(player.x, player.y + sdy)) player.y += sdy;
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
function getCamera() {
  return {
    x: Math.round(Math.max(0, Math.min(GRID_W * TILE_PX - VIEWPORT_W, player.x * TILE_PX - VIEWPORT_W / 2))),
    y: Math.round(Math.max(0, Math.min(GRID_H * TILE_PX - VIEWPORT_H, player.y * TILE_PX - VIEWPORT_H / 2))),
  };
}

// ── Drawing ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');

function drawTile(t, px, py) {
  const S = TILE_PX;
  switch (t) {
    case T.VOID:
      ctx.fillStyle = '#1a1814';
      ctx.fillRect(px, py, S, S);
      break;
    case T.FLOOR:
      ctx.fillStyle = '#c8b98a';
      ctx.fillRect(px, py, S, S);
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(px+.5, py+.5, S-1, S-1);
      break;
    case T.WALL:
      ctx.fillStyle = '#4a4235';
      ctx.fillRect(px, py, S, S);
      ctx.fillStyle = '#5e5245';
      ctx.fillRect(px, py, S, 5);
      ctx.fillStyle = '#302820';
      ctx.fillRect(px, py+S-3, S, 3);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px+.5, py+.5, S-1, S-1);
      break;
    case T.OBJ:
      ctx.fillStyle = '#c8b98a';
      ctx.fillRect(px, py, S, S);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(px+6, py+7, S-10, S-10);
      ctx.fillStyle = '#4a7c59';
      ctx.fillRect(px+5, py+5, S-10, S-10);
      ctx.fillStyle = '#5d9470';
      ctx.fillRect(px+5, py+5, S-10, 4);
      break;
  }
}

function drawInteractable(px, py, id) {
  const S = TILE_PX;
  ctx.fillStyle = 'rgba(200,168,75,0.18)';
  ctx.fillRect(px+2, py+2, S-4, S-4);
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(px+2.5, py+2.5, S-5, S-5);
  ctx.fillStyle = '#c8a84b';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(id, px+S/2, py+S/2);
}

function drawPlayer(px, py) {
  const S = TILE_PX, cx = px+S/2, cy = py+S/2;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx+1, cy+4, 7, 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#c8a84b';
  ctx.beginPath();
  ctx.arc(cx, cy, 9, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e8c860';
  ctx.beginPath();
  ctx.arc(cx-2.5, cy-2.5, 4, 0, Math.PI*2);
  ctx.fill();
}

function render() {
  const cam = getCamera();
  ctx.clearRect(0, 0, VIEWPORT_W, VIEWPORT_H);
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // Only render tiles visible in viewport
  const c0 = Math.max(0, Math.floor(cam.x / TILE_PX));
  const r0 = Math.max(0, Math.floor(cam.y / TILE_PX));
  const c1 = Math.min(GRID_W, c0 + Math.ceil(VIEWPORT_W / TILE_PX) + 2);
  const r1 = Math.min(GRID_H, r0 + Math.ceil(VIEWPORT_H / TILE_PX) + 2);

  for (let r = r0; r < r1; r++)
    for (let c = c0; c < c1; c++)
      drawTile(mapGrid[r][c], c*TILE_PX, r*TILE_PX);

  for (const obj of INTERACTABLES)
    drawInteractable(obj.col*TILE_PX, obj.row*TILE_PX, obj.id);

  drawPlayer((player.x - 0.5)*TILE_PX, (player.y - 0.5)*TILE_PX);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTs = null;
function loop(ts) {
  const dt = lastTs !== null ? Math.min((ts - lastTs) / 1000, 0.1) : 0;
  lastTs = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('keydown', e => { keys[e.key] = true;  e.preventDefault(); });
canvas.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('mousedown', () => canvas.focus());

// ── Init ──────────────────────────────────────────────────────────────────────
canvas.width  = VIEWPORT_W;
canvas.height = VIEWPORT_H;

const { grid, floorCount, start } = generateHouse();
mapGrid   = grid;
player.x  = start.x;
player.y  = start.y;
document.getElementById('sqftLabel').textContent =
  `~${(floorCount * SQFT_PER_TILE).toLocaleString()} sq ft`;

canvas.focus();
requestAnimationFrame(loop);
</script>
</body>
</html>
