<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map 1 — Puzzle Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #14120e;
    color: #e8dfc8;
    font-family: 'Cinzel', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px 48px;
    gap: 14px;
  }
  h1 { font-size: 26px; color: #c8a84b; letter-spacing: 3px; }
  .meta { font-family: monospace; font-size: 12px; color: #6e695f; }
  .meta span { color: #a09070; }

  #mapCanvas {
    display: block;
    image-rendering: pixelated;
    border: 2px solid #2e2a1e;
    border-radius: 4px;
    outline: none;
  }
  #mapCanvas:focus { border-color: #c8a84b; }

  .hint { font-family: monospace; font-size: 11px; color: #3a3530; }

  .legend {
    display: flex; gap: 18px; flex-wrap: wrap;
    justify-content: center;
    font-family: monospace; font-size: 11px; color: #4a4540;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }

  a { font-size: 12px; color: #4a4540; font-family: sans-serif; text-decoration: none; margin-top: 4px; }
  a:hover { color: #c8a84b; }
</style>
</head>
<body>

<h1>Map 1</h1>
<div class="meta">
  Scale: <span>1 tile = 10 sq ft</span>
  &nbsp;|&nbsp; Speed: <span>20 tiles / sec</span>
  &nbsp;|&nbsp; Area: <span id="sqftLabel">generating…</span>
</div>

<canvas id="mapCanvas" tabindex="0"></canvas>
<div class="hint">WASD / Arrow Keys &nbsp;·&nbsp; click canvas to focus</div>

<div class="legend">
  <div class="legend-item"><div class="swatch" style="background:#1a1814;"></div>Void</div>
  <div class="legend-item"><div class="swatch" style="background:#c8b98a;"></div>Floor</div>
  <div class="legend-item"><div class="swatch" style="background:#4a4235;"></div>Wall</div>
  <div class="legend-item"><div class="swatch" style="background:#4a7c59;"></div>Object</div>
  <div class="legend-item"><div class="swatch" style="background:#c8a84b;border-radius:50%;"></div>Player</div>
  <div class="legend-item"><div class="swatch" style="background:rgba(200,168,75,0.3);border-color:#c8a84b;"></div>Interactable</div>
</div>

<a href="index.html">← Back to Home</a>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const TILE_PX       = 32;    // px per tile
const SQFT_PER_TILE = 10;    // real-world sq ft per tile
const SPEED         = 20;    // tiles per second
const HITBOX        = 0.28;  // collision half-size in tiles
const VIEWPORT_W    = 800;
const VIEWPORT_H    = 520;
const GRID_W        = 68;
const GRID_H        = 58;

const T = { VOID:0, FLOOR:1, WALL:2, OBJ:3 };

// ── Interactables (future drag-and-drop) ──────────────────────────────────────
// { id: 'p1g1s', col: Number, row: Number }
// Add entries here; pressing E near one opens the given panel for that id.
const INTERACTABLES = [];

// ── Map generation ────────────────────────────────────────────────────────────
function generateMap() {
  let s = Date.now() | 0;
  const rng = (lo, hi) => {
    s = Math.imul(s, 1664525) + 1013904223 | 0;
    return lo + ((s >>> 0) % (hi - lo + 1));
  };

  const grid = Array.from({ length: GRID_H }, () => new Array(GRID_W).fill(T.VOID));
  const rooms = [];
  let floorCount = 0;

  // Place non-overlapping rooms until rooms supply ~800 floor tiles
  for (let attempt = 0; attempt < 800 && floorCount < 800; attempt++) {
    const w = rng(7, 16);
    const h = rng(5, 12);
    const x = rng(2, GRID_W - w - 3);
    const y = rng(2, GRID_H - h - 3);

    let ok = true;
    for (const r of rooms) {
      if (x < r.x2 + 3 && x + w > r.x1 - 2 && y < r.y2 + 3 && y + h > r.y1 - 2) {
        ok = false; break;
      }
    }
    if (!ok) continue;

    for (let ry = y; ry < y + h; ry++)
      for (let rx = x; rx < x + w; rx++) {
        grid[ry][rx] = T.FLOOR;
        floorCount++;
      }
    rooms.push({ x1:x, y1:y, x2:x+w-1, y2:y+h-1, cx:x+(w>>1), cy:y+(h>>1) });
  }

  // Connect rooms with 2-tile-wide corridors (nearest-neighbour MST)
  const connected = new Set([0]);
  while (connected.size < rooms.length) {
    let best = Infinity, bi = -1, bj = -1;
    for (const i of connected) {
      for (let j = 0; j < rooms.length; j++) {
        if (connected.has(j)) continue;
        const d = (rooms[i].cx - rooms[j].cx) ** 2 + (rooms[i].cy - rooms[j].cy) ** 2;
        if (d < best) { best = d; bi = i; bj = j; }
      }
    }
    if (bi === -1) break;
    const a = rooms[bi], b = rooms[bj];

    // Horizontal leg (2 rows wide)
    for (let rx = Math.min(a.cx, b.cx); rx <= Math.max(a.cx, b.cx); rx++)
      for (let dy = 0; dy <= 1; dy++) {
        const ny = a.cy + dy;
        if (ny >= 0 && ny < GRID_H && grid[ny][rx] === T.VOID) {
          grid[ny][rx] = T.FLOOR; floorCount++;
        }
      }
    // Vertical leg (2 cols wide)
    for (let ry = Math.min(a.cy, b.cy); ry <= Math.max(a.cy, b.cy); ry++)
      for (let dx = 0; dx <= 1; dx++) {
        const nx = b.cx + dx;
        if (nx >= 0 && nx < GRID_W && grid[ry][nx] === T.VOID) {
          grid[ry][nx] = T.FLOOR; floorCount++;
        }
      }

    connected.add(bj);
  }

  // Surround every floor tile with walls
  for (let ry = 0; ry < GRID_H; ry++)
    for (let rx = 0; rx < GRID_W; rx++)
      if (grid[ry][rx] === T.FLOOR)
        for (let dy = -1; dy <= 1; dy++)
          for (let dx = -1; dx <= 1; dx++) {
            const ny = ry+dy, nx = rx+dx;
            if (ny >= 0 && ny < GRID_H && nx >= 0 && nx < GRID_W && grid[ny][nx] === T.VOID)
              grid[ny][nx] = T.WALL;
          }

  const start = rooms[0];
  return { grid, floorCount, start: { x: start.cx + 0.5, y: start.cy + 0.5 } };
}

// ── Collision ─────────────────────────────────────────────────────────────────
let mapGrid = null;

function walkable(col, row) {
  if (row < 0 || row >= GRID_H || col < 0 || col >= GRID_W) return false;
  const t = mapGrid[row][col];
  return t === T.FLOOR || t === T.OBJ;
}
function canMoveTo(x, y) {
  const h = HITBOX;
  return walkable(Math.floor(x-h), Math.floor(y-h))
      && walkable(Math.floor(x+h), Math.floor(y-h))
      && walkable(Math.floor(x-h), Math.floor(y+h))
      && walkable(Math.floor(x+h), Math.floor(y+h));
}

// ── Player ────────────────────────────────────────────────────────────────────
const player = { x: 0, y: 0 };
const keys   = {};

function update(dt) {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  if (dx && dy) { dx *= 0.7071; dy *= 0.7071; }

  // Sub-step so fast movement can't tunnel through walls
  const steps = Math.max(1, Math.ceil(SPEED * dt / 0.35));
  const sdx = dx * SPEED * dt / steps;
  const sdy = dy * SPEED * dt / steps;
  for (let i = 0; i < steps; i++) {
    if (canMoveTo(player.x + sdx, player.y)) player.x += sdx;
    if (canMoveTo(player.x, player.y + sdy)) player.y += sdy;
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
function getCamera() {
  return {
    x: Math.round(Math.max(0, Math.min(GRID_W * TILE_PX - VIEWPORT_W, player.x * TILE_PX - VIEWPORT_W / 2))),
    y: Math.round(Math.max(0, Math.min(GRID_H * TILE_PX - VIEWPORT_H, player.y * TILE_PX - VIEWPORT_H / 2))),
  };
}

// ── Drawing (swap ctx.fill… calls with ctx.drawImage(sprite,…) later) ─────────
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');

function drawTile(t, px, py) {
  const S = TILE_PX;
  switch (t) {
    case T.VOID:
      ctx.fillStyle = '#1a1814';
      ctx.fillRect(px, py, S, S);
      break;
    case T.FLOOR:
      ctx.fillStyle = '#c8b98a';
      ctx.fillRect(px, py, S, S);
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(px+.5, py+.5, S-1, S-1);
      break;
    case T.WALL:
      ctx.fillStyle = '#4a4235';
      ctx.fillRect(px, py, S, S);
      ctx.fillStyle = '#5e5245';
      ctx.fillRect(px, py, S, 5);
      ctx.fillStyle = '#302820';
      ctx.fillRect(px, py+S-3, S, 3);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px+.5, py+.5, S-1, S-1);
      break;
    case T.OBJ:
      ctx.fillStyle = '#c8b98a';
      ctx.fillRect(px, py, S, S);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(px+6, py+7, S-10, S-10);
      ctx.fillStyle = '#4a7c59';
      ctx.fillRect(px+5, py+5, S-10, S-10);
      ctx.fillStyle = '#5d9470';
      ctx.fillRect(px+5, py+5, S-10, 4);
      break;
  }
}

function drawInteractable(px, py, id) {
  const S = TILE_PX;
  ctx.fillStyle = 'rgba(200,168,75,0.18)';
  ctx.fillRect(px+2, py+2, S-4, S-4);
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(px+2.5, py+2.5, S-5, S-5);
  ctx.fillStyle = '#c8a84b';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(id, px+S/2, py+S/2);
}

function drawPlayer(px, py) {
  const S = TILE_PX, cx = px+S/2, cy = py+S/2;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx+1, cy+4, 7, 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#c8a84b';
  ctx.beginPath();
  ctx.arc(cx, cy, 9, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e8c860';
  ctx.beginPath();
  ctx.arc(cx-2.5, cy-2.5, 4, 0, Math.PI*2);
  ctx.fill();
}

function render() {
  const cam = getCamera();
  ctx.clearRect(0, 0, VIEWPORT_W, VIEWPORT_H);
  ctx.save();
  ctx.translate(-cam.x, -cam.y);

  // Only render tiles visible in the current viewport (performance)
  const c0 = Math.max(0, Math.floor(cam.x / TILE_PX));
  const r0 = Math.max(0, Math.floor(cam.y / TILE_PX));
  const c1 = Math.min(GRID_W, c0 + Math.ceil(VIEWPORT_W / TILE_PX) + 2);
  const r1 = Math.min(GRID_H, r0 + Math.ceil(VIEWPORT_H / TILE_PX) + 2);

  for (let r = r0; r < r1; r++)
    for (let c = c0; c < c1; c++)
      drawTile(mapGrid[r][c], c*TILE_PX, r*TILE_PX);

  for (const obj of INTERACTABLES)
    drawInteractable(obj.col*TILE_PX, obj.row*TILE_PX, obj.id);

  drawPlayer((player.x - 0.5)*TILE_PX, (player.y - 0.5)*TILE_PX);
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTs = null;
function loop(ts) {
  const dt = lastTs !== null ? Math.min((ts - lastTs) / 1000, 0.1) : 0;
  lastTs = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── Input ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('keydown', e => { keys[e.key] = true;  e.preventDefault(); });
canvas.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('mousedown', () => canvas.focus());

// ── Init ──────────────────────────────────────────────────────────────────────
canvas.width  = VIEWPORT_W;
canvas.height = VIEWPORT_H;

const { grid, floorCount, start } = generateMap();
mapGrid   = grid;
player.x  = start.x;
player.y  = start.y;
document.getElementById('sqftLabel').textContent =
  `~${(floorCount * SQFT_PER_TILE).toLocaleString()} sq ft`;

canvas.focus();
requestAnimationFrame(loop);
</script>
</body>
</html>
